name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/workflows/node.js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync content from S3
        run: aws s3 sync s3://cori.data.verse/main/content/ content/

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: "/cori.data.verse"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: List build outputs
        run: |
          echo "=== public/ ==="
          ls -lA public/
          echo "=== public/assets/ ==="
          ls -lA public/assets/ 2>/dev/null || echo "No public/assets directory"
          echo "=== out/ root ==="
          ls -lA out/
          echo "=== out/_next/ ==="
          ls -lA out/_next/ 2>/dev/null || echo "No _next directory"
          echo "=== out/assets/ ==="
          ls -lA out/assets/ 2>/dev/null || echo "No assets directory"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
