project:
  type: default
  title: "Rural Dataverse"
  output-dir: content
  pre-render: Rscript -e "cori.data.verse::clean_stale_content()"
  render:
    - "index.qmd"
    - "about.qmd"
    - "charts/*/index.qmd"
    - "datasets/*/index.qmd"
    - "packages/*/index.qmd"
    - "posts/*/index.qmd"
    - "projects/*/index.qmd"
    - "resources/*/index.qmd"

# Site shell (nav, footer, etc.) is now managed by NextJS.
# See src/app/layout.tsx and src/components/

format:
  gfm:
    toc: false
    wrap: none

execute:
  freeze: auto
  echo: true
  warning: false
  message: false
